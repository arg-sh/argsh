name: LSP

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'vscode-argsh/**'
  pull_request:
    paths:
      - 'crates/**'
      - 'vscode-argsh/**'

jobs:
  test-syntax:
    name: argsh-syntax tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path crates/argsh-syntax/Cargo.toml

  test-lsp:
    name: argsh-lsp tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --manifest-path crates/argsh-lsp/Cargo.toml
      - run: cargo test --manifest-path crates/argsh-lsp/Cargo.toml

  check-extension:
    name: VSCode extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: cd vscode-argsh && npm install && npm run compile
