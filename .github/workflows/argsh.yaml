name: argsh
on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "!vscode-v*"
  pull_request:
    paths:
      - '.bin/**'
      - '.docker/**'
      - 'libraries/**'
      - 'test/**'
      - 'builtin/**'
      - 'minifier/**'
      - 'shdoc/**'
      - 'crates/**'
      - 'Dockerfile'
      - '.envrc'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions: read-all

env:
  CI_IMAGE: argsh-ci:local

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Stage 1: BUILD — compile all Rust crates once per architecture.
  # The amd64 job also builds the Docker image and saves it as an artifact
  # so fan-out jobs can docker-load it for test/lint/minify.
  # ═══════════════════════════════════════════════════════════════════════
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.arch }} binaries
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          target: artifacts
          outputs: type=local,dest=out
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}
      - name: Validate and make executables
        run: |
          for f in out/minifier out/shdoc out/libargsh.so out/argsh-lsp out/argsh-lint; do
            if [[ ! -f "${f}" ]]; then
              echo "Missing expected artifact: ${f}" >&2
              exit 1
            fi
          done
          chmod +x out/minifier out/shdoc out/argsh-lsp out/argsh-lint
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-linux-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 7
          path: out/
      # amd64 only: build the full Docker image and save it as an artifact
      # so fan-out jobs can docker-load it for test/lint/minify (~52MB compressed).
      - name: Build CI image
        if: matrix.arch == 'amd64'
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          provenance: false
          platforms: linux/amd64
          tags: ${{ env.CI_IMAGE }}
          cache-from: type=gha,scope=build-amd64
      - name: Save CI image
        if: matrix.arch == 'amd64'
        run: docker save ${{ env.CI_IMAGE }} | gzip > /tmp/ci-image.tar.gz
      - name: Upload CI image
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v7
        with:
          name: ci-image
          if-no-files-found: error
          retention-days: 1
          path: /tmp/ci-image.tar.gz

  # ═══════════════════════════════════════════════════════════════════════
  # Stage 2: FAN OUT — test, lint, coverage, minify run in parallel.
  # test/lint/minify run inside the freshly-built CI image.
  # Coverage rebuilds with instrumentation (separate Docker containers).
  # ═══════════════════════════════════════════════════════════════════════

  # ---------------------------------------------------------------------------
  # Test — run bats in both modes (pure-bash + native builtins).
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Load CI image
        uses: actions/download-artifact@v8
        with:
          name: ci-image
          path: /tmp
      - name: Import CI image
        run: docker load < /tmp/ci-image.tar.gz
      - name: Test (pure bash)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" -w /workspace \
            -e ARGSH_PURE_BASH_TEST=1 \
            ${{ env.CI_IMAGE }} test libraries/
      - name: Test (native builtins)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" -w /workspace \
            -e ARGSH_BUILTIN_TEST=1 \
            ${{ env.CI_IMAGE }} test libraries/

  # ---------------------------------------------------------------------------
  # Lint — shellcheck + argsh-lint on the argsh libraries.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Load CI image
        uses: actions/download-artifact@v8
        with:
          name: ci-image
          path: /tmp
      - name: Import CI image
        run: docker load < /tmp/ci-image.tar.gz
      - name: Lint
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" -w /workspace \
            ${{ env.CI_IMAGE }} lint libraries/

  # ---------------------------------------------------------------------------
  # Coverage — all 4 Rust crates in one job.
  # ---------------------------------------------------------------------------
  coverage:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Direnv
        uses: HatsuneMiku3939/direnv-action@v1
      - name: Builtin coverage
        run: argsh coverage builtin
      - name: Minifier coverage
        run: argsh coverage minifier
      - name: Shdoc coverage
        run: argsh coverage shdoc
      - name: LSP coverage
        run: argsh coverage lsp
      - name: Verify coverage files are in sync
        run: |
          git diff --exit-code \
            --ignore-matching-lines '^  "date":' \
            -- builtin/coverage.json \
               minifier/coverage.json \
               shdoc/coverage.json \
               crates/argsh-lsp/coverage.json

  # ---------------------------------------------------------------------------
  # Minify — produce argsh.min.sh using the freshly-built minifier.
  # Uses the CI image for minify, lint, and test — same container, same tools.
  # ---------------------------------------------------------------------------
  minify:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Load CI image
        uses: actions/download-artifact@v8
        with:
          name: ci-image
          path: /tmp
      - name: Import CI image
        run: docker load < /tmp/ci-image.tar.gz
      - name: Minify
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" -w /workspace \
            -e GIT_COMMIT_SHA=${{ github.sha }} \
            -e GIT_VERSION=${{ github.ref_name }} \
            ${{ env.CI_IMAGE }} minify
      - name: Lint minified
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" -w /workspace \
            ${{ env.CI_IMAGE }} lint argsh.min.sh
      - name: Test minified
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" -w /workspace \
            -e BATS_LOAD=argsh.min.sh \
            -e ARGSH_BUILTIN_TEST=1 \
            ${{ env.CI_IMAGE }} test libraries/
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: argsh
          if-no-files-found: error
          retention-days: 7
          path: argsh.min.sh

  # ═══════════════════════════════════════════════════════════════════════
  # Stage 3: FAN IN — assemble final outputs from stage 1+2 artifacts.
  # ═══════════════════════════════════════════════════════════════════════

  # ---------------------------------------------------------------------------
  # Minify-so — concatenate argsh.min.sh + .so → self-contained binary.
  # ---------------------------------------------------------------------------
  minify-so:
    runs-on: ubuntu-latest
    needs: [minify]
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Download builtin library
        uses: actions/download-artifact@v8
        with:
          name: binaries-linux-${{ matrix.arch }}
          path: binaries
      - name: Download argsh artifact
        uses: actions/download-artifact@v8
        with:
          name: argsh
          path: .
      - name: Compose argsh-so
        run: |
          {
            head -3 argsh.min.sh
            echo '# ── Appended native builtins ─────────────────────────────────────────'
            echo 'ARGSH_PAYLOAD_OFFSET=PLACEHOLDER'
            cat << 'SOEOF'
          # obfus ignore function
          __argsh_load_appended_so() {
            local _t; _t="$(mktemp "${TMPDIR:-/tmp}/argsh.XXXXXX.so")"
            # shellcheck disable=SC2064
            trap "rm -f '${_t}'" EXIT
            tail -c +$((ARGSH_PAYLOAD_OFFSET)) "${BASH_SOURCE[0]}" > "${_t}" || return 1
            # shellcheck disable=SC2229
            enable -f "${_t}" \
              :usage :usage::help :usage::completion :usage::docgen :usage::mcp :args \
              is::array is::uninitialized is::set is::tty \
              args::field_name to::int to::float to::boolean to::file to::string \
              import import::clear \
              2>/dev/null || return 1
            rm -f "${_t}"
            return 0
          }
          # obfus ignore variable
          declare -gi ARGSH_BUILTIN=0
          if __argsh_load_appended_so; then
            ARGSH_BUILTIN=1
          fi
          unset -f __argsh_load_appended_so
          SOEOF
            echo '# ────────────────────────────────────────────────────────────────────'
            tail -n +4 argsh.min.sh
            cat << 'EXITEOF'

          status=${?}
          if [[ "${BASH_SOURCE[0]}" == "${0}" ]]; then
            exit "${status}"
          else
            echo "argsh-so: cannot be sourced, use as shebang or execute directly" >&2
            return 1
          fi
          EXITEOF
          } > script-part.sh

          converged=0
          prev_sz=0
          for i in $(seq 1 10); do
            sz=$(wc -c < script-part.sh)
            if [ "${sz}" -eq "${prev_sz}" ]; then
              converged=1
              break
            fi
            prev_sz=${sz}
            sed -i "s/ARGSH_PAYLOAD_OFFSET=[0-9A-Z][0-9A-Z]*/ARGSH_PAYLOAD_OFFSET=$((sz + 1))/" script-part.sh
          done
          [ "${converged}" -eq 1 ] || { echo "Failed to stabilize ARGSH_PAYLOAD_OFFSET" >&2; exit 1; }

          cat script-part.sh binaries/libargsh.so > argsh-so
          chmod +x argsh-so
          rm script-part.sh
      - name: Smoke test
        if: matrix.arch == 'amd64'
        run: |
          bash argsh-so --version
          bash -c '
            offset=$(head -20 argsh-so | grep -oP "ARGSH_PAYLOAD_OFFSET=\K[0-9]+")
            _t=$(mktemp /tmp/argsh-test.XXXXXX.so)
            tail -c +$((offset)) argsh-so > "${_t}"
            enable -f "${_t}" :args 2>/dev/null
            type :args | grep -q "shell builtin" || { echo "Builtin :args not loaded"; rm -f "${_t}"; exit 1; }
            echo "argsh-so: builtins loaded successfully"
            rm -f "${_t}"
          '
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: argsh-so-linux-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 7
          path: argsh-so

  # ---------------------------------------------------------------------------
  # Docker — assemble final image reusing cached Rust layers from the build job.
  # The Rust build stages are cache hits (populated by the build job via GHA
  # cache), so only the final assembly layers run fresh.
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: [minify]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Download argsh.min.sh
        uses: actions/download-artifact@v8
        with:
          name: argsh
          path: .
      - name: Prepare
        run: chmod +x argsh.min.sh
      - name: Docker metadata
        uses: docker/metadata-action@v5
        id: metadata
        with:
          images: ghcr.io/${{ github.repository }}
          tags: ${{ startsWith(github.ref, 'refs/tags/v')
            && format('type=match,pattern=v(.*),group=1,value={0}', github.ref_name)
            || 'type=sha,format=long' }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Smoke test: load the CI image and run entrypoint tests inside it.
      - name: Load CI image
        uses: actions/download-artifact@v8
        with:
          name: ci-image
          path: /tmp
      - name: Import CI image
        run: docker load < /tmp/ci-image.tar.gz
      - name: Smoke test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" -w /workspace \
            ${{ env.CI_IMAGE }} test libraries/ .docker/test/
      # Multi-platform build + push with the final argsh.min.sh embedded.
      # Rust stages are cache hits from the build job.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          provenance: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: |
            type=gha,scope=build-amd64
            type=gha,scope=build-arm64

  # ═══════════════════════════════════════════════════════════════════════
  # Stage 4: RELEASE (tag only) — build native LSP/lint binaries for
  # macOS/Linux, package VSCode extension, publish everything.
  # ═══════════════════════════════════════════════════════════════════════

  build-lsp:
    name: Build argsh-lsp/lint (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build both binaries
        run: cargo build --release --manifest-path crates/argsh-lsp/Cargo.toml --bins --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp crates/argsh-lsp/target/${{ matrix.target }}/release/argsh-lsp  dist/argsh-lsp-${{ matrix.platform }}
          cp crates/argsh-lsp/target/${{ matrix.target }}/release/argsh-lint dist/argsh-lint-${{ matrix.platform }}
          chmod +x dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: argsh-lsp-${{ matrix.platform }}
          path: dist/argsh-lsp-${{ matrix.platform }}

      - uses: actions/upload-artifact@v7
        with:
          name: argsh-lint-${{ matrix.platform }}
          path: dist/argsh-lint-${{ matrix.platform }}

  package-vsix:
    name: Package VSCode extension (${{ matrix.platform }})
    needs: build-lsp
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux-x64, linux-arm64, darwin-x64, darwin-arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download LSP binary
        uses: actions/download-artifact@v8
        with:
          name: argsh-lsp-${{ matrix.platform }}
          path: vscode-argsh/bin/

      - name: Prepare binary
        run: |
          chmod +x vscode-argsh/bin/*
          mv vscode-argsh/bin/argsh-lsp-${{ matrix.platform }} vscode-argsh/bin/argsh-lsp

      - name: Install and compile
        run: cd vscode-argsh && npm install && npm run compile

      - name: Package VSIX
        run: |
          npm install -g @vscode/vsce
          cd vscode-argsh
          vsce package --target ${{ matrix.platform }} -o ../argsh-${{ matrix.platform }}.vsix

      - uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.platform }}
          path: argsh-${{ matrix.platform }}.vsix

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    environment: release
    needs: [minify, minify-so, build-lsp, docker, package-vsix]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Download argsh script
        uses: actions/download-artifact@v8
        with:
          name: argsh
          path: artifacts
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binaries-linux-*
          path: artifacts
      - name: Download all argsh-so
        uses: actions/download-artifact@v8
        with:
          pattern: argsh-so-linux-*
          path: artifacts
      - name: Download all LSP binaries
        uses: actions/download-artifact@v8
        with:
          pattern: argsh-lsp-*
          path: artifacts/lsp
          merge-multiple: true
      - name: Download all argsh-lint binaries
        uses: actions/download-artifact@v8
        with:
          pattern: argsh-lint-*
          path: artifacts/lsp
          merge-multiple: true
      - name: Download all VSIX packages
        uses: actions/download-artifact@v8
        with:
          pattern: vsix-*
          path: artifacts/vsix
          merge-multiple: true
      - name: Assemble release assets
        run: |
          mkdir -p release

          cp artifacts/argsh.min.sh release/argsh
          chmod +x release/argsh

          for arch in amd64 arm64; do
            cp "artifacts/binaries-linux-${arch}/libargsh.so" "release/argsh-linux-${arch}.so"
            cp "artifacts/binaries-linux-${arch}/minifier"    "release/minifier-linux-${arch}"
            cp "artifacts/binaries-linux-${arch}/shdoc"       "release/shdoc-linux-${arch}"
            cp "artifacts/argsh-so-linux-${arch}/argsh-so" "release/argsh-so-linux-${arch}"
            chmod +x "release/minifier-linux-${arch}" "release/shdoc-linux-${arch}" "release/argsh-so-linux-${arch}"
          done

          for p in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            cp "artifacts/lsp/argsh-lsp-${p}"  "release/argsh-lsp-${p}"
            cp "artifacts/lsp/argsh-lint-${p}" "release/argsh-lint-${p}"
            chmod +x "release/argsh-lsp-${p}" "release/argsh-lint-${p}"
          done

          cp artifacts/vsix/*.vsix release/

          cd release
          sha256sum * > sha256sum.txt
      - name: Upload release
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${TAG_NAME}" --draft --title "argsh ${TAG_NAME}" --generate-notes 2>/dev/null \
            || gh release edit "${TAG_NAME}" --draft --title "argsh ${TAG_NAME}"
          gh release upload "${TAG_NAME}" --clobber release/*

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          title="Release ${TAG_NAME}"
          branch="release-${TAG_NAME}"

          cp artifacts/argsh.min.sh argsh.min.sh
          git add argsh.min.sh
          git diff --cached --quiet || git commit -m "${title}"
          git push --force origin "HEAD:refs/heads/${branch}"
          gh pr create --title "${title}" --body "" --head "${branch}" 2>/dev/null \
            || echo "PR already exists for ${branch}"
