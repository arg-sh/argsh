name: LSP Release

on:
  push:
    tags:
      - 'vscode-v*'

permissions:
  contents: write

jobs:
  build-lsp:
    name: Build argsh-lsp/dap (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build all binaries
        run: cargo build --release --manifest-path crates/argsh-lsp/Cargo.toml --bins --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp crates/argsh-lsp/target/${{ matrix.target }}/release/argsh-lsp  dist/argsh-lsp-${{ matrix.platform }}
          cp crates/argsh-lsp/target/${{ matrix.target }}/release/argsh-dap  dist/argsh-dap-${{ matrix.platform }}
          chmod +x dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: argsh-lsp-${{ matrix.platform }}
          path: dist/argsh-lsp-${{ matrix.platform }}

      - uses: actions/upload-artifact@v7
        with:
          name: argsh-dap-${{ matrix.platform }}
          path: dist/argsh-dap-${{ matrix.platform }}

  package-extension:
    name: Package VSCode extension
    needs: build-lsp
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux-x64
          - platform: linux-arm64
          - platform: darwin-x64
          - platform: darwin-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download LSP binary
        uses: actions/download-artifact@v8
        with:
          name: argsh-lsp-${{ matrix.platform }}
          path: vscode-argsh/bin/

      - name: Download DAP binary
        uses: actions/download-artifact@v8
        with:
          name: argsh-dap-${{ matrix.platform }}
          path: vscode-argsh/bin/

      - name: Prepare binaries
        run: |
          chmod +x vscode-argsh/bin/*
          mv vscode-argsh/bin/argsh-lsp-${{ matrix.platform }} vscode-argsh/bin/argsh-lsp
          mv vscode-argsh/bin/argsh-dap-${{ matrix.platform }} vscode-argsh/bin/argsh-dap

      - name: Install dependencies
        run: cd vscode-argsh && npm install

      - name: Compile TypeScript
        run: cd vscode-argsh && npm run compile

      - name: Package VSIX
        run: |
          npm install -g @vscode/vsce
          cd vscode-argsh
          vsce package --target ${{ matrix.platform }} -o ../argsh-${{ matrix.platform }}.vsix

      - uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.platform }}
          path: argsh-${{ matrix.platform }}.vsix

  publish:
    name: Publish
    needs: package-extension
    runs-on: ubuntu-latest
    steps:
      - name: Download all VSIX packages
        uses: actions/download-artifact@v8
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: List packages
        run: ls -la *.vsix

      - name: Publish to Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npm install -g @vscode/vsce
          for vsix in *.vsix; do
            vsce publish --packagePath "$vsix" --pat "$VSCE_PAT"
          done

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          npm install -g ovsx
          for vsix in *.vsix; do
            ovsx publish "$vsix" -p "$OVSX_PAT"
          done

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for vsix in *.vsix; do
            gh release upload "$TAG" "$vsix" --repo "$GITHUB_REPOSITORY" --clobber
          done
